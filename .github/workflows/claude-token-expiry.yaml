name: Claude Token Expiry Monitor

# Template for the per-repo token expiry monitor.
# setup-tokens (sync-claude-action.sh) generates the per-repo version by
# replacing __SCHEDULE_ENTRIES__ with 7 computed cron entries at rotation time:
#   30, 15, 7, 3, 2, 1, and 0 days before expiry (cron: '0 9 D M *').
# Each entry fires once per year on its exact date — no daily polling.
# Do not edit repos directly; re-run setup-tokens to rotate and reschedule.
#
# Generated files look like:
#   schedule:
#     - cron: '0 9 16 4 *'  # 30 days before expiry (2027-04-16)
#     - cron: '0 9 1 5 *'   # 15 days before expiry (2027-05-01)
#     - cron: '0 9 9 5 *'   # 7 days before expiry  (2027-05-09)
#     - cron: '0 9 13 5 *'  # 3 days before expiry  (2027-05-13)
#     - cron: '0 9 14 5 *'  # 2 days before expiry  (2027-05-14)
#     - cron: '0 9 15 5 *'  # 1 day before expiry   (2027-05-15)
#     - cron: '0 9 16 5 *'  # expiry day             (2027-05-16)

on:
  schedule:
    - cron: '0 9 9 4 *'  # 30 days before expiry (2027-04-09)
    - cron: '0 9 24 4 *'  # 15 days before expiry (2027-04-24)
    - cron: '0 9 2 5 *'  # 7 days before expiry (2027-05-02)
    - cron: '0 9 6 5 *'  # 3 days before expiry (2027-05-06)
    - cron: '0 9 7 5 *'  # 2 days before expiry (2027-05-07)
    - cron: '0 9 8 5 *'  # 1 day before expiry (2027-05-08)
    - cron: '0 9 9 5 *'  # expiry day (2027-05-09)
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Ensure claude-token-expiry label exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create claude-token-expiry \
            --description "Tracks CLAUDE_CODE_OAUTH_TOKEN expiry warnings" \
            --color B60205 \
            --force \
            --repo "${{ github.repository }}" 2>/dev/null || true

      - name: Send expiry notification
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          state_file=".github/claude-token-state.json"
          repo="${{ github.repository }}"
          label="claude-token-expiry"

          # Handle missing state file (token set out-of-band, state never written)
          if [ ! -f "$state_file" ]; then
            echo "State file missing — expiry date unknown."
            open_issue=$(gh issue list --repo "$repo" --label "$label" \
              --state open --json number --jq '.[0].number // ""')
            if [ -z "$open_issue" ]; then
              gh issue create --repo "$repo" \
                --title "⚠️ CLAUDE_CODE_OAUTH_TOKEN expiry date unknown" \
                --label "$label" \
                --body "## Claude OAuth Token — Expiry Unknown

The \`CLAUDE_CODE_OAUTH_TOKEN\` secret is set for \`$repo\` but its expiry
date is not tracked (\`.github/claude-token-state.json\` does not exist).

**Repository:** \`$repo\`

## How to fix

From the \`chriscalo/dev-skills\` repo, run:

\`\`\`bash
sync-claude-action.sh setup-tokens $repo
\`\`\`

A browser window will open for Claude authentication. Once you log in, the script will write the state file, schedule notifications for the new expiry date, and close this issue automatically."
              echo "Opened 'expiry unknown' issue."
            else
              echo "Expiry unknown — issue #$open_issue already open. No action."
            fi
            exit 0
          fi

          # Compute days remaining
          issued_at=$(jq -r '.issued_at' "$state_file")
          lifetime_days=$(jq -r '.lifetime_days' "$state_file")
          issued_epoch=$(date -d "$issued_at" +%s)
          today_epoch=$(date -d "$(date +%Y-%m-%d)" +%s)
          days_elapsed=$(( (today_epoch - issued_epoch) / 86400 ))
          days_remaining=$(( lifetime_days - days_elapsed ))
          expires_on=$(date -d "$issued_at + $lifetime_days days" +%Y-%m-%d)

          echo "issued=$issued_at  lifetime=${lifetime_days}d  elapsed=${days_elapsed}d  remaining=${days_remaining}d  expires=$expires_on"

          # Match against expected notification thresholds (±1 day tolerance
          # for GitHub scheduling delays). Use the lowest match so a token
          # that slipped past multiple thresholds gets the most urgent message.
          matched=""
          for threshold in 0 1 2 3 7 15 30; do
            if [ "$days_remaining" -le "$threshold" ] && [ "$days_remaining" -ge $((threshold - 1)) ]; then
              matched=$threshold
            fi
          done

          if [ -z "$matched" ]; then
            echo "days_remaining=$days_remaining does not match any notification threshold."
            echo "This cron entry is stale (token was rotated to a new expiry date)."
            exit 0
          fi

          # Build notification content
          if [ "$days_remaining" -le 0 ]; then
            prefix="🚨"
            urgency="has EXPIRED"
          elif [ "$days_remaining" -eq 1 ]; then
            prefix="🚨"
            urgency="expires TOMORROW ($expires_on)"
          elif [ "$days_remaining" -le 7 ]; then
            prefix="⚠️"
            urgency="expires in $days_remaining days ($expires_on)"
          else
            prefix="⏰"
            urgency="expires in $days_remaining days ($expires_on)"
          fi

          open_issue=$(gh issue list --repo "$repo" --label "$label" \
            --state open --json number --jq '.[0].number // ""')

          if [ -n "$open_issue" ]; then
            gh issue comment "$open_issue" --repo "$repo" \
              --body "**Reminder** ($(date +%Y-%m-%d)): $days_remaining days remaining — token expires $expires_on. Run \`sync-claude-action.sh setup-tokens\` to renew."
            echo "Commented on existing issue #$open_issue."
          else
            gh issue create --repo "$repo" \
              --title "$prefix CLAUDE_CODE_OAUTH_TOKEN $urgency" \
              --label "$label" \
              --body "## Claude OAuth Token Expiry Warning

\`CLAUDE_CODE_OAUTH_TOKEN\` $urgency.

| Field | Value |
|-------|-------|
| Repository | \`$repo\` |
| Issued | \`$issued_at\` |
| Expires | \`$expires_on\` |
| Days remaining | $days_remaining |

## How to renew now

From the \`chriscalo/dev-skills\` repo, run one command:

\`\`\`bash
sync-claude-action.sh setup-tokens
\`\`\`

A browser window will open for Claude authentication. Once you log in, the script automatically:
1. Issues a fresh \`CLAUDE_CODE_OAUTH_TOKEN\`
2. Pushes the new secret to all managed repos
3. Records the new expiry date (\`.github/claude-token-state.json\`)
4. Reschedules expiry notifications for the new date
5. Closes this issue

**To renew just this repo** (without touching others):
\`\`\`bash
sync-claude-action.sh setup-tokens $repo
\`\`\`

## Notification schedule

Warnings fire at **30, 15, 7, 3, 2, 1, and 0 days** before expiry — no daily polling."
            echo "Opened new notification issue."
          fi